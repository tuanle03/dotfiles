# /Users/tuanle/.config/tmuxinator/lixfollow.yml

name: lixfollow
root: ~/projects/lixibox/lixfollow

# Kill old processes that commonly keep ports busy BEFORE any window starts
# Runs every time project starts
on_project_start: |
  echo "Cleaning old lixfollow processes/ports..."

  # Kill by known dev ports (adjust if yours differ)
  lsof -ti tcp:8000 | xargs kill -9 2>/dev/null || true   # api
  lsof -ti tcp:8001 | xargs kill -9 2>/dev/null || true   # admin
  lsof -ti tcp:5555 | xargs kill -9 2>/dev/null || true   # flower/dashboard
  lsof -ti tcp:6379 | xargs kill -9 2>/dev/null || true   # optional redis local
  lsof -ti tcp:5432 | xargs kill -9 2>/dev/null || true   # optional postgres local

  # Kill leftover honcho / uvicorn / celery from previous broken sessions
  pkill -f "honcho" 2>/dev/null || true
  pkill -f "uvicorn.*lixfollow" 2>/dev/null || true
  pkill -f "celery.*lixfollow" 2>/dev/null || true
  pkill -f "flower.*lixfollow" 2>/dev/null || true

  sleep 1

startup_window: editor

windows:
  - editor:
      layout: even-horizontal
      panes:
        - nvim

  - claude:
      layout: even-horizontal
      panes:
        - claude

  - hermes:
      layout: even-horizontal
      panes:
        - hermes

  - server:
      layout: even-horizontal
      panes:
        - make dev

  - git:
      panes:
        - git status
